name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: typecheck + node:test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Run node:test suite
        env:
          OPENAI_API_KEY: ""
          GEMINI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: npm test

      - name: Run OpenAI-Agents surfaces suite (custom runner)
        run: npm run test:surfaces

  install-smoke:
    name: install-from-tarball smoke (build + import)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build tarball
        working-directory: source
        run: |
          npm install
          npm run build
          npm pack
          mv clawagents-*.tgz "$RUNNER_TEMP/clawagents.tgz"

      - name: Install tarball into a fresh consumer project and import
        run: |
          mkdir consumer
          cd consumer
          npm init -y
          npm install "$RUNNER_TEMP/clawagents.tgz"
          node --input-type=module -e "
            import * as cg from 'clawagents';
            const keys = Object.keys(cg);
            if (typeof cg.createClawAgent !== 'function') {
              console.error('FAIL: createClawAgent missing or not a function'); process.exit(1);
            }
            if (typeof cg.startGateway !== 'function') {
              console.error('FAIL: startGateway missing or not a function'); process.exit(1);
            }
            if (!cg.ssrfDeps || typeof cg.ssrfDeps.isPrivateHost !== 'function') {
              console.error('FAIL: ssrfDeps missing'); process.exit(1);
            }
            console.log('IMPORT OK — exported symbols:', keys.length);
          "
          test -x ./node_modules/.bin/clawagents || (echo 'FAIL: bin not executable'; exit 1)
          ./node_modules/.bin/clawagents --help > /dev/null
          echo "BIN OK"
